name: Deploy to GitHub Pages

on:
  # Auto-deploy when main moves.
  push:
    branches: [main]
  # Manual deploy via the Actions UI or `gh workflow run deploy.yml --ref main`.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload site
        uses: withastro/action@v3
        with:
          package-manager: bun@latest
          # Astro 6 requires Node >= 22.12 — the action defaults to Node 20.
          node-version: '22'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
